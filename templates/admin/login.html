{% import "_macros.html" as ui with context %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · {{ site.site_title }}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand-mark">{{ ui.icon('gem') }}</div>
    <h1>{{ site.site_title }}</h1>
    {% if error %}<div class="flash flash--error">{{ error }}</div>{% endif %}
    <form action="/admin/login" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="field">
        <label for="username">Username</label>
        <input class="input" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-block" type="submit">{{ _('admin.login') }}</button>
    </form>
  </div>
</div>
</body>
</html>
