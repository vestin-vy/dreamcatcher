# Render Blueprint — web service + managed PostgreSQL for the DreamCatcher shop.
# Deploy: push this repo to GitHub, then Render Dashboard -> New + -> Blueprint -> pick the repo.
#
# Notes:
#  * Data now lives in a managed PostgreSQL database (encrypted at rest, automated
#    backups, persists across deploys/restarts) instead of the ephemeral SQLite file.
#  * The web service filesystem is still ephemeral, so AUTO_SEED=true seeds the demo
#    catalog ONLY when the products table is empty (no-op once data exists). Note that
#    uploaded images still live on the ephemeral disk — move them to object storage later.
#  * Render serves HTTPS, so SESSION_HTTPS_ONLY=true is correct here.
databases:
  - name: dreamcatcher-db
    plan: free
    databaseName: dreamcatcher
    user: dreamcatcher

services:
  - type: web
    name: dreamcatcher-shop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # --proxy-headers + --forwarded-allow-ips: behind Render's proxy the peer address
    # is the proxy, not the visitor; this makes request.client.host the real client IP
    # (login rate-limit keys on it). Only Render's proxy can reach the service directly,
    # so trusting X-Forwarded-For from any peer ("*") is safe here.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips "*"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Postgres connection string (Render emits 'postgres://...'; config normalizes it).
      - key: DB_URL
        fromDatabase:
          name: dreamcatcher-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong random value
      - key: ADMIN_USERNAME
        value: admin
      # bcrypt hash for the demo admin password "dreamcatcher".
      # Change it in the Render dashboard (Environment) for anything non-demo:
      #   python -m app.security hash "your-password"
      - key: ADMIN_PASSWORD_HASH
        value: "$2b$12$4wdPwZvxMMT78foW.XDjAOrzf.0Oo4tXvcist2UjLeJhZdcntkgQ."
      - key: DEFAULT_LANG
        value: el
      - key: VIVA_MODE
        value: demo
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: AUTO_SEED
        value: "true"
